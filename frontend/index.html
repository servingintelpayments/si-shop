<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SI Shop</title>
<meta name="description" content="SI Shop — ServingIntel procurement portal"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand:#1a5276;--brand2:#133b57;--brand3:#2b6080;
  --text:#0d0d0d;--muted:#595959;--hint:#7a90ad;
  --border:#d9d9d9;--surf:#ffffff;--page:#eaeff2;
  --lite:#eaf1f7;--lite2:#f4f7fa;
  --green:#1a5e2d;--red:#8b1a1a;--warn:#6b4400;
  --success-bg:#eaf3de;--error-bg:#fce8e8;--warn-bg:#faeeda;
  --emp:#0d2137;--emp2:#1a3a52;--emp3:#2b6080;
  --amazon:#f59e0b;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;
}
html,body{height:100%;background:var(--page);color:var(--text);font-family:var(--fm);font-size:13px;}
input,select,textarea,button{font-family:var(--fm);font-size:13px;}
button{cursor:pointer;}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#f0f2f5}
::-webkit-scrollbar-thumb{background:#b8ccd9;border-radius:3px}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100vh;}
.main-content{flex:1;padding:16px 20px;max-width:1380px;width:100%;margin:0 auto;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(13,13,13,.07);}
.logo{display:flex;align-items:center;gap:9px;font-family:var(--fh);font-weight:800;font-size:15px;letter-spacing:-.02em;}
.logo-mark{width:30px;height:30px;background:var(--brand);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;}
.emp-mode .logo-mark{background:var(--emp);}
.emp-badge{background:var(--emp);color:#a7ddf2;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:.05em;margin-left:6px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.user-chip{display:flex;align-items:center;gap:7px;background:var(--lite);border:1px solid var(--border);padding:5px 12px;border-radius:6px;font-size:.78rem;}
.u-av{width:22px;height:22px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;flex-shrink:0;}
.emp-mode .u-av{background:var(--emp);}
.role-pill{font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:3px;}
.role-customer{background:var(--lite);color:var(--brand);}
.role-manager{background:var(--warn-bg);color:var(--warn);}
.cart-btn{position:relative;background:var(--brand);color:#fff;border:none;padding:7px 16px;border-radius:6px;font-family:var(--fh);font-weight:700;font-size:.82rem;display:flex;align-items:center;gap:7px;}
.cart-btn:hover{background:var(--brand2);}
.cart-badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;border-radius:10px;font-size:.65rem;font-weight:800;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

/* ── STEPS ── */
.steps-bar{background:#f4f7fa;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;overflow-x:auto;}
.step{display:flex;align-items:center;gap:6px;padding:9px 14px;font-size:.75rem;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;}
.step.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:700;}
.step.done{color:var(--green);}
.step-num{width:18px;height:18px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;}
.step.done .step-num{background:var(--green);border-color:var(--green);color:#fff;}
.step-arr{color:var(--border);padding:0 2px;font-size:.85rem;}

/* ── LOGIN PAGE ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;
  background:linear-gradient(rgba(26,82,118,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,82,118,.04) 1px,transparent 1px),var(--page);
  background-size:40px 40px,40px 40px;}
.login-box{width:100%;max-width:400px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:2.5rem;box-shadow:0 8px 32px rgba(13,13,13,.1);}
.login-logo{display:flex;align-items:center;gap:10px;font-family:var(--fh);font-weight:800;font-size:1.2rem;letter-spacing:-.02em;margin-bottom:2rem;}
.login-logo-mark{width:34px;height:34px;background:var(--brand);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:900;color:#fff;}
.login-title{font-family:var(--fh);font-size:1.5rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.3rem;}
.login-sub{font-size:.78rem;color:var(--muted);margin-bottom:1.75rem;line-height:1.5;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:1rem;}
.fg label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.fg .iw{position:relative;}
.fg .ii{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--hint);}
.fg input{width:100%;background:var(--lite2);border:1px solid var(--border);color:var(--text);padding:10px 12px 10px 34px;border-radius:7px;outline:none;transition:border-color .2s;}
.fg input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(26,82,118,.1);}
.fg input::placeholder{color:var(--hint);}
.demo-creds{background:var(--lite);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:1.25rem;}
.demo-creds .dc-title{font-size:.68rem;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.demo-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:.5px solid var(--border);font-size:.75rem;}
.demo-row:last-child{border-bottom:none;}
.demo-row .dl{color:var(--muted);}
.demo-row .dv{font-weight:600;color:var(--brand);}
.demo-row .use-btn{background:var(--brand);color:#fff;border:none;padding:3px 10px;border-radius:4px;font-size:.68rem;font-weight:700;}
.login-btn{width:100%;background:var(--brand);color:#fff;border:none;padding:12px;border-radius:7px;font-family:var(--fh);font-weight:800;font-size:.92rem;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .2s;}
.login-btn:hover{background:var(--brand2);}
.login-btn:disabled{opacity:.5;cursor:not-allowed;}
.forgot-link{background:none;border:none;color:var(--brand);font-size:.75rem;float:right;margin-top:-8px;margin-bottom:8px;}
.login-err{background:var(--error-bg);border:1px solid rgba(139,26,26,.2);color:var(--red);border-radius:6px;padding:9px 12px;font-size:.75rem;margin-bottom:1rem;display:none;}
.login-err.show{display:block;}
.login-footer{margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);text-align:center;font-size:.72rem;color:var(--muted);}
.login-footer strong{color:var(--brand);}

/* ── SPINNER ── */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── PROFILE SETUP ── */
.profile-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;
  background:linear-gradient(rgba(26,82,118,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,82,118,.04) 1px,transparent 1px),var(--page);
  background-size:40px 40px,40px 40px;}
.profile-card{width:100%;max-width:680px;background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(13,13,13,.1);animation:fadeUp .35s ease both;}
.profile-hero{background:linear-gradient(135deg,rgba(26,82,118,.1) 0%,rgba(167,221,242,.15) 100%);border-bottom:1px solid var(--border);padding:1.75rem 2rem;display:flex;align-items:center;gap:1rem;}
.profile-av{width:52px;height:52px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:1.2rem;font-weight:900;flex-shrink:0;}
.profile-hero h2{font-family:var(--fh);font-size:1.2rem;font-weight:800;letter-spacing:-.02em;}
.profile-hero p{font-size:.78rem;color:var(--muted);margin-top:.25rem;line-height:1.5;}
.profile-body{padding:1.75rem 2rem;}
.section-hdr{font-size:.68rem;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.9rem;display:flex;align-items:center;gap:8px;}
.section-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem;}
.form-grid .span2{grid-column:span 2;}
.fgroup{display:flex;flex-direction:column;gap:5px;}
.fgroup label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.fgroup input,.fgroup select,.fgroup textarea{background:var(--lite2);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:7px;outline:none;transition:border-color .2s;width:100%;}
.fgroup input:focus,.fgroup select:focus,.fgroup textarea:focus{border-color:var(--brand);box-shadow:0 0 0 2px rgba(26,82,118,.08);}
.fgroup input::placeholder,.fgroup textarea::placeholder{color:var(--hint);}
.same-ship{display:flex;align-items:center;gap:7px;font-size:.78rem;color:var(--muted);cursor:pointer;margin-bottom:.9rem;}
.same-ship input{accent-color:var(--brand);}
.profile-footer{padding:1.25rem 2rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.skip-btn{background:none;border:none;color:var(--muted);font-size:.78rem;}
.skip-btn:hover{color:var(--text);}
.save-btn{background:var(--brand);color:#fff;border:none;padding:10px 24px;border-radius:7px;font-family:var(--fh);font-weight:800;font-size:.88rem;display:flex;align-items:center;gap:7px;}
.save-btn:hover{background:var(--brand2);}

/* ── AMAZON-STYLE CATALOG ── */
.amz-top-bar{background:#1a5276;padding:8px 16px;display:flex;align-items:center;gap:10px;}
.amz-logo-txt{color:#fff;font-family:var(--fh);font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px;}
.amz-logo-sq{width:28px;height:28px;background:#fff;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:var(--brand);}
.emp-mode .amz-top-bar{background:var(--emp);}
.emp-mode .amz-logo-sq{color:var(--emp);}
.amz-search-wrap{flex:1;display:flex;border-radius:4px;overflow:hidden;border:2px solid var(--brand3);}
.emp-mode .amz-search-wrap{border-color:#2b6080;}
.amz-search-cat{background:var(--lite2);border:none;padding:0 10px;font-size:.75rem;color:var(--text);border-right:1px solid var(--border);}
.amz-search-in{flex:1;border:none;padding:7px 12px;font-size:.82rem;outline:none;color:var(--text);}
.amz-search-btn{background:var(--brand3);border:none;padding:0 14px;color:#fff;}
.emp-mode .amz-search-btn{background:#1a5276;}
.amz-top-right{display:flex;align-items:center;gap:6px;margin-left:auto;}
.amz-link{color:#fff;font-size:.75rem;padding:4px 8px;border:1px solid transparent;border-radius:3px;cursor:pointer;white-space:nowrap;line-height:1.3;}
.amz-link:hover{border-color:#fff;}
.amz-link strong{display:block;font-size:.82rem;}
.amz-cart-wrap{display:flex;align-items:center;gap:5px;color:#fff;padding:4px 8px;border:1px solid transparent;border-radius:3px;cursor:pointer;position:relative;}
.amz-cart-wrap:hover{border-color:#fff;}
.amz-cart-count{font-size:1.1rem;font-weight:800;color:var(--amazon);}
.amz-nav{background:var(--brand3);display:flex;align-items:center;padding:0 16px;overflow-x:auto;gap:2px;}
.emp-mode .amz-nav{background:var(--emp2);}
.amz-nav-item{color:#fff;font-size:.75rem;padding:7px 11px;white-space:nowrap;cursor:pointer;border:1px solid transparent;border-radius:3px;}
.amz-nav-item:hover,.amz-nav-item.active{border-color:#fff;}
.amz-nav-item.bold{font-weight:700;}
.amz-layout{display:flex;gap:14px;align-items:flex-start;}
.amz-sidebar{width:195px;flex-shrink:0;}
.amz-main{flex:1;min-width:0;}
.amz-card2{background:#fff;border:1px solid var(--border);border-radius:4px;margin-bottom:10px;overflow:hidden;}
.amz-card2-head{font-weight:700;font-size:.8rem;padding:9px 13px;border-bottom:1px solid var(--border);background:var(--lite2);}
.amz-cat-list{list-style:none;}
.amz-cat-li{padding:7px 13px;cursor:pointer;border-left:3px solid transparent;font-size:.78rem;color:var(--brand);display:flex;align-items:center;justify-content:space-between;}
.amz-cat-li:hover{background:var(--lite);}
.amz-cat-li.active{border-left-color:var(--brand);background:var(--lite);font-weight:700;color:var(--text);}
.amz-cat-cnt{font-size:.68rem;color:var(--muted);background:var(--lite);padding:1px 5px;border-radius:8px;}
.amz-cat-li.active .amz-cat-cnt{background:var(--border);}
.filter-grp{padding:9px 13px;}
.filter-lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;font-weight:600;}
.filter-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:.75rem;cursor:pointer;}
.filter-row input{accent-color:var(--brand);}
.results-bar{background:#fff;border:1px solid var(--border);border-radius:4px;padding:9px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.results-count{font-size:.78rem;color:var(--muted);}
.sort-sel{border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:.75rem;background:#fff;}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.prod-card{background:#fff;border:1px solid var(--border);border-radius:4px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.prod-card:hover{box-shadow:0 2px 10px rgba(26,82,118,.12);border-color:var(--brand);}
.prod-img{height:120px;background:linear-gradient(135deg,var(--lite),#ddeaf4);display:flex;align-items:center;justify-content:center;font-size:36px;border-bottom:1px solid var(--lite);}
.prod-body{padding:9px;}
.prod-cat{font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--brand);background:rgba(26,82,118,.08);padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:4px;}
.prod-name{font-size:.8rem;font-weight:600;color:var(--brand);line-height:1.35;margin-bottom:3px;}
.prod-sku{font-size:.68rem;color:var(--muted);margin-bottom:5px;}
.prod-price{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:3px;}
.prod-price small{font-size:.68rem;font-weight:400;color:var(--muted);}
.d365-tag{background:var(--emp);color:#a7ddf2;font-size:.62rem;font-weight:700;padding:1px 5px;border-radius:2px;margin-bottom:5px;display:inline-block;}
.prod-stock{font-size:.7rem;color:var(--green);margin-bottom:7px;}
.prod-stock.low{color:var(--warn);}
.vendor-tag{font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:3px;margin-bottom:4px;display:inline-flex;align-items:center;gap:3px;}
.vendor-cost{font-size:.68rem;color:var(--muted);margin-bottom:4px;}
.vendor-margin{color:var(--green);font-weight:700;}
.qty-row{display:flex;align-items:center;gap:7px;margin-bottom:0;}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.qty-ctrl button{background:var(--lite);border:none;width:24px;height:24px;font-size:.95rem;color:var(--text);}
.qty-ctrl button:hover{background:var(--border);}
.qty-ctrl span{width:28px;text-align:center;font-size:.8rem;}
.add-btn{flex:1;background:var(--brand);color:#fff;border:none;padding:6px;border-radius:4px;font-size:.72rem;font-weight:700;}
.add-btn:hover{background:var(--brand2);}
.add-btn.added{background:var(--green);}
.req-bar{text-align:center;padding:1.5rem 0 .5rem;border-top:1px solid var(--border);margin-top:.5rem;}
.req-bar p{font-size:.78rem;color:var(--muted);margin-bottom:8px;}
.req-btn{background:none;border:1.5px dashed var(--brand);color:var(--brand);padding:9px 22px;border-radius:6px;font-size:.82rem;font-weight:700;font-family:var(--fh);}
.req-btn:hover{background:var(--lite);}

/* ── EMPLOYEE EXTRAS ── */
.emp-bar{background:var(--emp);color:#a7ddf2;padding:10px 16px;border-radius:4px;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.emp-bar select{background:var(--emp2);border:1px solid #2b6080;color:#fff;padding:5px 10px;border-radius:4px;font-size:.78rem;flex:1;min-width:180px;}
.emp-bar input[type=number]{background:var(--emp2);border:1px solid #2b6080;color:#fff;padding:5px 8px;border-radius:4px;font-size:.78rem;width:64px;text-align:center;}
.emp-bar label{font-size:.72rem;color:#7a90ad;}
.emp-badge2{background:var(--brand);color:#a7ddf2;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:3px;white-space:nowrap;}
.emp-tabs{display:flex;gap:2px;margin-bottom:12px;background:#fff;border:1px solid var(--border);border-radius:6px;padding:4px;width:fit-content;}
.emp-tab{padding:6px 14px;font-size:.78rem;border-radius:4px;border:none;background:none;color:var(--muted);display:flex;align-items:center;gap:5px;}
.emp-tab:hover{background:var(--lite);color:var(--brand);}
.emp-tab.active{background:var(--brand);color:#fff;font-weight:700;}
.emp-tab-cnt{font-size:.62rem;padding:1px 5px;border-radius:8px;}
.emp-tab.active .emp-tab-cnt{background:rgba(255,255,255,.25);}
.emp-tab:not(.active) .emp-tab-cnt{background:var(--lite);color:var(--brand);}

/* ── CART PANEL ── */
.cart-overlay{position:fixed;inset:0;background:rgba(13,13,13,.5);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
.cart-overlay.open{opacity:1;pointer-events:all;}
.cart-panel{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:100vw;background:#fff;border-left:1px solid var(--border);z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 20px rgba(13,13,13,.1);}
.cart-panel.open{transform:translateX(0);}
.cp-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border);}
.cp-head h2{font-family:var(--fh);font-size:1rem;font-weight:700;}
.cp-close{background:none;border:none;font-size:1.3rem;color:var(--muted);line-height:1;}
.cp-close:hover{color:var(--text);}
.cp-items{flex:1;overflow-y:auto;padding:.9rem 1.1rem;display:flex;flex-direction:column;gap:10px;}
.cp-empty{text-align:center;color:var(--muted);font-size:.82rem;margin-top:2.5rem;}
.cp-item{display:flex;gap:10px;background:var(--lite2);border:1px solid var(--border);border-radius:7px;padding:10px;}
.cp-info{flex:1;}
.cp-name{font-size:.82rem;font-weight:600;color:var(--text);}
.cp-sku{font-size:.68rem;color:var(--muted);margin-top:1px;}
.cp-row{display:flex;align-items:center;gap:7px;margin-top:7px;}
.cp-price{font-family:var(--fh);font-size:.9rem;font-weight:700;color:var(--brand);margin-left:auto;}
.cp-remove{background:none;border:none;color:var(--muted);font-size:.9rem;}
.cp-remove:hover{color:var(--red);}
.cp-foot{padding:1rem 1.1rem;border-top:1px solid var(--border);}
.cp-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;}
.cp-total span{font-size:.78rem;color:var(--muted);}
.cp-total strong{font-family:var(--fh);font-size:1.2rem;font-weight:800;}
.checkout-go{width:100%;background:var(--brand);color:#fff;border:none;padding:12px;border-radius:7px;font-family:var(--fh);font-weight:800;font-size:.9rem;}
.checkout-go:hover{background:var(--brand2);}

/* ── CHECKOUT PAGE ── */
.checkout-wrap{display:grid;grid-template-columns:1fr 340px;gap:16px;max-width:1020px;}
.sec-card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:1.5rem;margin-bottom:12px;}
.sec-title{font-size:.8rem;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1.1rem;display:flex;align-items:center;gap:8px;}

const fmt=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
function cartTotal(){
  const sub=S.cart.reduce((t,c)=>t+c.price*c.qty,0);
  return S.portalMode==="employee"&&S.empDiscount>0 ? sub*(1-S.empDiscount/100) : sub;
}
function cartSub(){return S.cart.reduce((t,c)=>t+c.price*c.qty,0);}
function cartCount(){return S.cart.reduce((t,c)=>t+c.qty,0);}
function initials(n){return n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}

let _toastTimer;
function toast(msg,err=false){
  const el=document.getElementById("toast");
  if(!el)return;
  clearTimeout(_toastTimer);
  el.textContent=msg;
  el.className="toast show"+(err?" err":"");
  _toastTimer=setTimeout(()=>el.className="toast",3000);
}

function addToCart(p,qty=1){
  qty=Math.max(1,parseInt(qty)||1);
  const ex=S.cart.find(c=>c.id===p.id);
  const cart=ex?S.cart.map(c=>c.id===p.id?{...c,qty:c.qty+qty}:c):[...S.cart,{...p,qty}];
  ss({cart});
  toast(`${p.name} added to cart`);
}
function rmFromCart(id){ss({cart:S.cart.filter(c=>c.id!==id)});}
function updQty(id,qty){
  qty=Math.max(1,parseInt(qty)||1);
  ss({cart:S.cart.map(c=>c.id===id?{...c,qty}:c)});
}

function calcTax(zip){
  const state=ZIP_STATE[zip]||null;
  if(!state)return null;
  const rate=TAX_RATES[state]||0;
  return{state,rate,amount:Math.round(cartTotal()*rate*100)/100};
}

function render(){
  const app=document.getElementById("app");

  const isEmp=S.portalMode==="employee";
  let html="";
  if(S.page==="login"){html=renderLogin();}
  else if(S.page==="profile"){html=renderProfile();}
  else{
    html=renderHeader(isEmp)+renderSteps(isEmp)+`<div class="main-content">`+
      (S.page==="catalog"  ?renderCatalog(isEmp):"") +
      (S.page==="checkout" ?renderCheckout(isEmp):"") +
      (S.page==="confirm"  ?renderConfirm():"") +
      `</div>`;
    html+=renderCart();
  }
  html+=renderModals();
  app.innerHTML=html;
  attachEvents();
}

function renderProdCard(p,isEmp){
  const qty=S.qtyMap[p.id]||1;
  const inCart=S.cart.find(c=>c.id===p.id);
  const vm=VENDOR_META[p.vendor_source]||VENDOR_META.manual;
  const margin=p.vendor_cost>0?p.price-p.vendor_cost:null;
  const mPct=margin&&p.price>0?Math.round(margin/p.price*100):null;
  return`<div class="prod-card">
  <div class="prod-img">${p.icon||"📦"}</div>
  <div class="prod-body">
    <div class="prod-cat">${p.cat}</div>
    <div class="prod-name">${p.name}</div>
    <div class="prod-sku">SKU: ${p.sku}</div>
    <div class="prod-price">${fmt(p.price)} <small>/ ${p.unit}</small></div>
    <div class="d365-tag">D365</div>
    ${isEmp&&p.vendor_source?`
      <div class="vendor-tag" style="background:${vm.bg};color:${vm.color};">${vm.label}</div>
      ${margin?`<div class="vendor-cost">Cost: ${fmt(p.vendor_cost)} <span class="vendor-margin">+${fmt(margin)} (${mPct}%)</span></div>`:""}
    `:""}
    <div class="prod-stock">✓ Available</div>
    <div class="qty-row">
      <div class="qty-ctrl">
        <button data-dec="${p.id}">−</button>
        <span>${qty}</span>
        <button data-inc="${p.id}">+</button>
      </div>
      <button class="add-btn ${inCart?"added":""}" data-add="${p.id}">${inCart?"✓ Added":"Add to Cart"}</button>
    </div>
  </div>
</div>`;
}

        <div class="d365-notice">
          ⚡ A <strong>Dynamics 365 Quote</strong> will be auto-created ${isEmp?`under ${S.placingFor?.accountName||"the selected account"}`:"under your account"} upon ${isEmp?"submission":"payment"}.
        </div>
      </div>
    </div>
  </div>`;
}

   CART PANEL

        <div class="cp-sku">${c.sku}</div>

    <div class="cp-total"><span>Total</span><strong>${fmt(cartTotal())}</strong></div>

   MODALS

/* ═══════════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════════ */
function on(id,ev,fn){const e=document.getElementById(id);if(e)e.addEventListener(ev,fn);}

function attachEvents(){
  /* ── LOGIN ── */
  on("useCustomer","click",()=>{
    const e=document.getElementById("loginEmail");
    const p=document.getElementById("loginPw");
    if(e)e.value="customer@acme.com";
    if(p)p.value="demo123";
    ss({_demoEmail:"customer@acme.com"});
  });
  on("useManager","click",()=>{
    const e=document.getElementById("loginEmail");
    const p=document.getElementById("loginPw");
    if(e)e.value="manager@servingintel.com";
    if(p)p.value="demo123";
    ss({_demoEmail:"manager@servingintel.com"});
  });
  on("loginBtn","click",async()=>{
    const email=(document.getElementById("loginEmail")?.value||"").trim();
    const pw=document.getElementById("loginPw")?.value||"";
    if(!email||!pw){ss({loginErr:"Please enter your email and password."});return;}
    ss({loginLoading:true,loginErr:""});
    await new Promise(r=>setTimeout(r,900));
    const domain=(email.split("@")[1]||"").toLowerCase();
    const prefix=(email.split("@")[0]||"").toLowerCase();
    const isEmp=["servingintel.com","si.com","si.local"].includes(domain);
    const empRole=isEmp?(prefix==="admin"?"admin":prefix==="manager"?"manager":"rep"):null;
    const name=email.split("@")[0].replace(/[._]/g," ").replace(/\b\w/g,c=>c.toUpperCase());
    const isNew=!isEmp;
    ss({
      loginLoading:false,loginErr:"",_demoEmail:null,
      portalMode:isEmp?"employee":"customer",
      empRole,
      user:{name,email,initials:initials(name)},
      isNew,
      page:isNew?"profile":"catalog",
      empTab:"catalog",
    });
    toast(isEmp?`Welcome, ${name} — ${empRole} portal`:`Welcome back, ${name}! 👋`);
  });

  /* ── PROFILE ── */
  on("saveProfile","click",()=>{ss({page:"catalog"});toast("Profile saved!");});
  on("skipProfile","click",()=>ss({page:"catalog"}));

  /* ── HEADER / NAV ── */
  on("openCart","click",()=>ss({cartOpen:true}));
  on("closeCart","click",()=>ss({cartOpen:false}));
  on("cartOverlay","click",()=>ss({cartOpen:false}));
  on("goCheckout","click",()=>{if(S.cart.length===0){toast("Add items first",true);return;}ss({cartOpen:false,page:"checkout"});});
  on("backCatalog","click",()=>ss({page:"catalog"}));
  on("newOrder","click",()=>ss({page:"login",cart:[],cartOpen:false,order:null,taxInfo:null,billing:null,checkoutStep:"form",portalMode:"customer",empRole:null,user:null,empTab:"catalog",empDiscount:0,placingFor:null,amazonResults:[],amazonSearched:false,sourcedAsins:{},selectedOrder:null,fulfilledItems:{},requestModal:false,requestDone:false,loginErr:"",_demoEmail:null}));

  /* ── SEARCH ── */
  on("searchInput","input",e=>ss({search:e.target.value}));

  /* ── EMPLOYEE ── */
  on("empPlacingFor","change",e=>{
    const map={acme:"Acme Corporation",riverdale:"Riverdale Hospitality",peak:"Peak Restaurants",suncoast:"Suncoast Dining"};
    const v=e.target.value;
    ss({placingFor:v?{accountId:v,accountName:map[v]}:null});
  });
  on("empDiscount","input",e=>ss({empDiscount:Math.min(50,Math.max(0,parseFloat(e.target.value)||0))}));

  /* ── EMPLOYEE TABS ── */
  document.querySelectorAll("[data-emptab]").forEach(b=>b.addEventListener("click",()=>ss({empTab:b.dataset.emptab})));

  /* ── AMAZON SEARCH ── */
  on("azSearchBtn","click",async()=>{
    const q=(document.getElementById("azSearchIn")?.value||"").trim();
    if(!q)return;
    ss({amazonLoading:true,amazonSearched:false,amazonQuery:q});
    await new Promise(r=>setTimeout(r,1200));
    const results=MOCK_AMAZON_RESULTS.map(r=>({...r,title:r.title.replace(/\(.*?\)/,`(for: "${q}")`)||r.title}));
    ss({amazonLoading:false,amazonSearched:true,amazonResults:results});
    toast(`Found ${results.length} results on Amazon`);
  });
  const azIn=document.getElementById("azSearchIn");
  if(azIn)azIn.addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("azSearchBtn")?.click();});

  /* ── ADD SOURCED AMAZON TO CART ── */
  document.querySelectorAll("[data-amz-asin]").forEach(b=>{
    b.addEventListener("click",()=>{
      const asin=b.dataset.amzAsin;
      const title=b.dataset.amzTitle;
      const price=parseFloat(b.dataset.amzPrice);
      const cost=parseFloat(b.dataset.amzCost);
      addToCart({id:`amz-${asin}`,sku:asin,name:title,cat:"Amazon Sourced",unit:"EA",price,vendor_source:"amazon",vendor_name:"Amazon",vendor_cost:cost,vendor_sku:asin,icon:"📦"},1);
      ss({sourcedAsins:{...S.sourcedAsins,[asin]:true}});
    });
  });

  /* ── ORDER QUEUE ── */
  document.querySelectorAll("[data-fulfill]").forEach(b=>{
    b.addEventListener("click",e=>{
      e.stopPropagation();
      const o=MOCK_ORDERS.find(o=>o.id===b.dataset.fulfill);
      ss({selectedOrder:o,fulfilledItems:{}});
      setTimeout(()=>document.querySelector(".order-detail")?.scrollIntoView({behavior:"smooth"}),100);
    });
  });
  document.querySelectorAll("[data-order]").forEach(row=>{
    row.addEventListener("click",()=>{
      const o=MOCK_ORDERS.find(o=>o.id===row.dataset.order);
      if(o)ss({selectedOrder:o,fulfilledItems:{}});
    });
  });

  /* ── MARK ITEM DONE ── */
  document.querySelectorAll("[data-mark-done]").forEach(b=>{
    b.addEventListener("click",()=>{
      const id=b.dataset.markDone;
      const refInputId=b.dataset.refInput;
      const ref=refInputId?document.getElementById(refInputId)?.value||"REF-MANUAL":b.dataset.ref||"SI-INTERNAL";
      const fi={...S.fulfilledItems,[id]:{done:true,ref:ref||"SI-INTERNAL"}};
      ss({fulfilledItems:fi});
      toast("Item marked as fulfilled ✓");
    });
  });
  on("markOrderComplete","click",()=>{
    if(S.selectedOrder){
      toast(`Order ${S.selectedOrder.id} marked complete! Customer notified.`);
      ss({selectedOrder:null,fulfilledItems:{}});
    }
  });
  on("closeOrderDetail","click",()=>ss({selectedOrder:null,fulfilledItems:{}}));

  /* ── SHIPPING METHOD ── */
  ["smStandard","smExpress","smOvernight"].forEach(id=>{
    on(id,"change",e=>{if(e.target.checked)ss({shipping:{method:e.target.value}});});
  });

  /* ── TAX CALCULATION (live on ZIP) ── */
  on("shipZip","input",async e=>{
    const zip=e.target.value.trim();
    if(zip.length!==5)return;
    ss({taxLoading:true,taxInfo:null});
    await new Promise(r=>setTimeout(r,600)); // simulate Avalara API
    const tax=calcTax(zip);
    ss({taxLoading:false,taxInfo:tax});
    if(tax)toast(`Tax: ${(tax.rate*100).toFixed(2)}% (${tax.state}) = ${fmt(tax.amount)}`);
  });

  /* ── CHECKOUT SUBMIT ── */
  on("placeOrderBtn","click",async()=>{
    if(S.portalMode==="employee"){
      const po=document.getElementById("poNumber")?.value?.trim();
      if(!po){toast("Enter a PO number",true);return;}
    }
    const isEmp=S.portalMode==="employee";
    ss({checkoutStep:"processing"});
    await new Promise(r=>setTimeout(r,2200));
    const tax=S.taxInfo||{amount:0,state:"",rate:0};
    const disc=S.empDiscount>0?cartSub()*S.empDiscount/100:0;
    const total=cartSub()-disc+tax.amount;
    ss({
      checkoutStep:"done",
      page:"confirm",
      cartOpen:false,
      order:{
        transactionId:"TXN"+Date.now(),
        authCode:"AUTH"+Math.floor(Math.random()*900000+100000),
        poNumber:document.getElementById("poNumber")?.value||"",
        total,
        customerName:S.user?.name,
      },
    });
    toast(isEmp?"Order submitted to D365! 📋":"Payment processed! 🎉");
  });

  /* ── CATEGORY FILTER ── */
  document.querySelectorAll("[data-cat]").forEach(li=>{
    li.addEventListener("click",()=>ss({filterCat:li.dataset.cat}));
  });

  /* ── REQUEST MODAL ── */
  on("openReqModal","click",()=>ss({requestModal:true,requestDone:false}));
  on("closeReqModal","click",()=>ss({requestModal:false,requestDone:false}));
  on("reqModalBg","click",e=>{if(e.target.id==="reqModalBg")ss({requestModal:false});});
  on("submitReq","click",async()=>{
    const d=document.getElementById("reqItemDesc")?.value?.trim();
    if(!d){toast("Describe the item",true);return;}
    await new Promise(r=>setTimeout(r,800));
    ss({requestDone:true});
    toast("Request submitted! Team will respond within 1 business day.");
  });
}

/* ═══════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════ */
// Global delegated handler — attached ONCE, not inside attachEvents
document.addEventListener("click",e=>{
  const inc=e.target.dataset.inc;
  const dec=e.target.dataset.dec;
  const add=e.target.dataset.add;
  if(inc){const q=(S.qtyMap[inc]||1)+1;ss({qtyMap:{...S.qtyMap,[inc]:q}});return;}
  if(dec){const q=Math.max(1,(S.qtyMap[dec]||1)-1);ss({qtyMap:{...S.qtyMap,[dec]:q}});return;}
  if(add){
    const p=PRODUCTS.find(x=>x.id===add);
    if(p)addToCart(p,S.qtyMap[p.id]||1);
    return;
  }
  const ci=e.target.dataset.cartInc;
  const cd=e.target.dataset.cartDec;
  const cr=e.target.dataset.cartRm;
  if(ci){updQty(ci,(S.cart.find(c=>c.id===ci)?.qty||1)+1);return;}
  if(cd){updQty(cd,(S.cart.find(c=>c.id===cd)?.qty||1)-1);return;}
  if(cr){rmFromCart(cr);return;}
});

render();
</script>
</body>
</html>
